<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Support Ticket Submitted</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #ffffff;
            padding: 10px 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            flex-direction: column;
        }

        header img {
            height: 120px;
            margin-bottom: 10px;
        }

        nav {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        nav a {
            color: #333;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #007bff;
        }

        main {
            flex: 1;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .content {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 20px;
            background-color: #004080;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #003366;
        }

        .background-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; 
            max-width: 800px;
            opacity: 0.05;
            z-index: 1; 
            pointer-events: none; 
        }

        footer {
            background-color: #333;
            color: #ffffff;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            width: 100%;
            position: relative;
            bottom: 0;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #cccccc;
        }

        @media (max-width: 768px) {
            header {
                height: auto;
            }

            header img {
                height: 100px;
            }

            nav {
                flex-direction: column;
                gap: 10px;
            }

            nav a {
                font-size: 14px;
            }

            .content {
                padding: 20px;
            }

            button {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 10px;
                height: auto;
            }

            header img {
                height: 80px;
            }

            nav a {
                font-size: 14px;
            }

            .content {
                padding: 15px;
            }

            button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Header with logo and navigation -->
    <header>
        <a href="dashboard.html">
            <img src="images/logo.png" alt="MedNarrate Logo">
        </a>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="logout.php">Logout</a>
        </nav>
    </header>

    <!-- Main content area -->
    <main>
        <!-- Background logo behind the content -->
        <img src="images/logo.png" alt="MedNarrate Background Logo" class="background-logo">
        
        <!-- Thank You Message -->
        <div class="content">
            <h1>Thank You!</h1>
            <p>Your support ticket has been successfully submitted. Our team will get back to you as soon as possible.</p>
            <button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2024 MedNarrate. All rights reserved.
    </footer>
</body>
</html>
