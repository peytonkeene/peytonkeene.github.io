<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - MedNarrate</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
        }

        header {
            background-color: #ffffff;
            padding: 10px 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header img {
            height: 100px; /* Adjust to match your logo size */
        }

        main {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #004080;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-size: 18px;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            background-color: #333;
            color: #ffffff;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            width: 100%;
            position: absolute;
            bottom: 0;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #cccccc;
        }
    </style>
</head>
<body>
    <!-- Header with logo -->
    <header>
        <img src="images/logo.png" alt="MedNarrate Logo">
    </header>

    <!-- Main content -->
    <main>
        <h1>Thank You!</h1>
        <p>Your message has been successfully sent. We will get back to you as soon as possible.</p>
        <p><a href="index.html">Return to Home</a></p>
    </main>

    <!-- Footer with privacy policy and copyright -->
    <footer>
        <a href="privacy.html">Privacy Policy</a> | &copy; 2024 MedNarrate. All rights reserved.
    </footer>
</body>
</html>
