<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work in Progress - MedNarrate</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header styling */
        header {
            background-color: #ffffff;
            padding: 10px 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            height: 150px;
        }

        header img {
            height: 200px;
            margin-left: -50px;
        }

        nav {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        nav a {
            color: #333;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #007bff;
        }

        /* Main content styling */
        main {
            flex: 1;
            padding: 50px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .btn-dashboard {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .btn-dashboard:hover {
            background-color: #0056b3;
        }

        /* Transparent logo behind the content */
        .background-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            opacity: 0.05;
            z-index: 1;
            pointer-events: none;
        }

        /* Footer styling */
        footer {
            background-color: #333;
            color: #ffffff;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            width: 100%;
            position: relative;
            bottom: 0;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #cccccc;
        }
    </style>
</head>
<body>
    <!-- Header with logo and navigation -->
    <header>
        <a href="index.html">
            <img src="images/logo.png" alt="MedNarrate Logo">
        </a>
        <nav>
            <a href="index.html">Home</a>

            <a href="solutions.html">Solutions</a>
            <a href="contact.html">Contact</a>
            <a href="logout.php">Log Out</a>
        </nav>
    </header>

    <!-- Main content area -->
    <main>
        <!-- Background logo behind the content -->
        <img src="images/logo.png" alt="MedNarrate Background Logo" class="background-logo">
        
        <!-- Work in Progress Message -->
        <div class="content">
            <h1>Work in Progress</h1>
            <p>This page is currently under construction. Please check back soon!</p>
            <a href="gcems_dashboard.html" class="btn-dashboard">Go to Dashboard</a>
        </div>
    </main>

    <!-- Footer with privacy policy and copyright -->
    <footer>
        <a href="privacy.html">Privacy Policy</a> | &copy; 2024 MedNarrate. All rights reserved.
    </footer>
</body>
</html>
